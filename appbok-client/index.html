<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Apex (appbok.se / www): skicka bara admin och inloggning till admin-subdomänen. Övrigt (/, landningssida, /preview/mobile m.m.) stannar här. -->
    <script>
      (function () {
        var h = location.hostname.toLowerCase();
        if (h !== 'appbok.se' && h !== 'www.appbok.se') return;
        var path = location.pathname || '/';
        if (path === '/admin' || path.indexOf('/admin/') === 0) {
          location.replace('https://admin.appbok.se' + location.pathname + location.search + location.hash);
          return;
        }
        if (path === '/login' || path.indexOf('/login/') === 0) {
          location.replace('https://admin.appbok.se' + location.pathname + location.search + location.hash);
          return;
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>appbok-client</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
